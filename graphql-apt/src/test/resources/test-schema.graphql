# Star Wars schema based on https://graphql.org/learn/schema/
# Adapted for feign-graphql-apt test purposes

type Query {
  character(id: ID!): Character
  characters(filter: CharacterFilter): [Character]
  starship(id: ID!): Starship
  searchStarships(criteria: StarshipSearchCriteria!): [Starship]
}

type Mutation {
  createCharacter(input: CreateCharacterInput!): Character
  updateEpisode(id: ID!, episode: Episode!): Character
  createStarship(input: CreateStarshipInput!): Starship
}

type Character {
  id: ID!
  name: String!
  email: String
  appearsIn: Episode!
  location: Location
  tags: [String]
  friends: [Character]
  starship: Starship
}

type Starship {
  id: ID!
  name: String!
  location: Location
  squadrons: [Squadron]
  specs: ShipSpecs
}

type Squadron {
  id: ID!
  name: String!
  leader: Character
  members: [Character]
  subSquadrons: [Squadron]
  traits: [Trait]
}

type Trait {
  key: String!
  value: String!
}

type ShipSpecs {
  lengthMeters: Int
  classification: String
  weapons: [Weapon]
}

type Weapon {
  name: String!
  parentWeapon: Weapon
  traits: [Trait]
}

type Location {
  planet: String
  sector: String
  region: String
  coordinates: Coordinates
}

type Coordinates {
  latitude: Float
  longitude: Float
}

input CreateCharacterInput {
  name: String!
  email: String!
  appearsIn: Episode
  location: LocationInput
  tags: [String]
  starshipId: ID
}

input CharacterFilter {
  nameContains: String
  appearsIn: Episode
  traitFilter: TraitFilterInput
}

input TraitFilterInput {
  keys: [String]
  matchAll: Boolean
}

input LocationInput {
  planet: String
  sector: String
  region: String
  coordinates: CoordinatesInput
}

input CoordinatesInput {
  latitude: Float
  longitude: Float
}

input CreateStarshipInput {
  name: String!
  location: LocationInput
  squadrons: [SquadronInput]
  specs: ShipSpecsInput
}

input SquadronInput {
  name: String!
  leaderCharacterId: ID
  subSquadrons: [SquadronInput]
  traits: [TraitInput]
}

input TraitInput {
  key: String!
  value: String!
}

input ShipSpecsInput {
  lengthMeters: Int
  classification: String
  weapons: [WeaponInput]
}

input WeaponInput {
  name: String!
  parentWeaponName: String
  traits: [TraitInput]
}

input StarshipSearchCriteria {
  nameContains: String
  classifications: [String]
  minLengthMeters: Int
  squadronFilter: SquadronFilterInput
}

input SquadronFilterInput {
  nameContains: String
  minMembers: Int
  traits: [TraitInput]
}

enum Episode {
  NEWHOPE
  EMPIRE
  JEDI
}
